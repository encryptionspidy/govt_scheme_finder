name: schemeplus_app
description: SchemePlus Flutter app for discovering and managing Indian government schemes.
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  google_fonts: ^6.1.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  hive_test: ^1.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

flutter_launcher_icons:
  image_path: assets/images/logo.jpg
  android: true
  ios: true
  min_sdk_android: 21
