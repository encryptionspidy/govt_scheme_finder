services:
  schemeplus-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=4000
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DB_PATH=./data/schemes.sqlite
      - CACHE_TTL_SECONDS=600
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=120
